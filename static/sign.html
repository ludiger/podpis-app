<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Podpis dokumentu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.header{background:#1d2433;color:white;padding:16px 24px;font-weight:700;font-size:18px}
.container{max-width:720px;margin:24px auto;padding:0 16px}
.card{background:white;border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:16px;margin-bottom:12px}
.preview-wrap{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;position:relative;margin-bottom:14px}
.preview-wrap img{width:100%;display:block}
.sig-highlight{position:absolute;border:2px solid #1D9E75;background:rgba(29,158,117,.1);border-radius:4px;pointer-events:none}
.canvas-wrap{border:2px solid #ddd;border-radius:10px;overflow:hidden;position:relative;background:#fff}
canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.btn{padding:11px 20px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary{background:#378ADD;color:white}
.btn-green{background:#1D9E75;color:white}
.btn-gray{background:#f0f0f0;color:#333}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.all-done{text-align:center;padding:20px}
.checkmark{font-size:48px;margin-bottom:10px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:12px}
.overlay.show{display:flex}
.spinner{width:36px;height:36px;border:4px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay p{color:white;font-size:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:white;padding:10px 20px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transition:.3s}
.toast.show{opacity:1}
.toast.error{background:#dc2626}
.step{display:none}
.step.active{display:block}
</style>
</head>
<body>
<div class="header">✍️ Podpis dokumentu</div>
<div class="container">

  <div class="step active" id="step-loading">
    <div class="card"><p style="text-align:center;color:#888">Načítavam dokument...</p></div>
  </div>

  <div class="step" id="step-sign">
    <div class="card">
      <h2 id="doc-name">Dokument</h2>
      <p style="font-size:12px;color:#888;margin-bottom:10px">Zelený rámček ukazuje miesto podpisu na strane <span id="sig-page-num"></span>.</p>
      <div class="preview-wrap" id="preview-wrap">
        <img id="preview-img" src="">
        <div class="sig-highlight" id="sig-highlight"></div>
      </div>
    </div>
    <div class="card">
      <h2>Vlastnoručný podpis</h2>
      <div class="canvas-wrap">
        <canvas id="sig-canvas"></canvas>
      </div>
      <div class="btn-row">
        <button class="btn btn-gray" onclick="clearCanvas()">🗑 Vymazať</button>
        <button class="btn btn-green" onclick="submitSignature()">✓ Podpísať a uložiť</button>
      </div>
    </div>
  </div>

  <div class="step" id="step-done">
    <div class="card">
      <div class="all-done">
        <div class="checkmark">✅</div>
        <h2>Dokument bol podpísaný!</h2>
        <p style="margin:10px 0;color:#666">Podpísaný PDF je pripravený na stiahnutie.</p>
        <button class="btn btn-green" onclick="downloadSigned()" style="width:100%">⬇️ Stiahnuť podpísaný PDF</button>
      </div>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <p id="overlay-text">Spracúvam...</p>
</div>
<div class="toast" id="toast"></div>

<script>
const token = location.pathname.split("/").pop();
let canvas, ctx, drawing=false;

function ov(show, text){
  document.getElementById("overlay").classList.toggle("show", show);
  if(text) document.getElementById("overlay-text").textContent = text;
}
function toast(msg, isError){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show" + (isError?" error":"");
  setTimeout(()=>t.classList.remove("show"), 3000);
}
function showStep(id){
  document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

async function init(){
  try{
    const r = await fetch(`/api/doc/${token}`);
    if(!r.ok) throw new Error("Dokument nenájdený");
    const d = await r.json();

    if(d.signed){
      showStep("step-done");
      return;
    }

    document.getElementById("doc-name").textContent = d.filename;
    document.getElementById("sig-page-num").textContent = (d.sig_position.page+1);

    const img = document.getElementById("preview-img");
    img.src = `/api/doc/${token}/page/${d.sig_position.page}`;
    await new Promise(res=>{ img.onload = res; });

    const wrap = document.getElementById("preview-wrap");
    const scale = wrap.offsetWidth / d.sig_position.page_width;
    const hl = document.getElementById("sig-highlight");
    hl.style.left = (d.sig_position.x * scale) + "px";
    hl.style.top = (d.sig_position.y * scale) + "px";
    hl.style.width = (d.sig_position.width * scale) + "px";
    hl.style.height = (d.sig_position.height * scale) + "px";

    showStep("step-sign");
    requestAnimationFrame(setupCanvas);
  }catch(e){
    document.getElementById("step-loading").querySelector(".card p").textContent = "Chyba: " + e.message;
  }
}

function setupCanvas(){
  canvas = document.getElementById("sig-canvas");
  const wrap = canvas.parentElement;
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.offsetWidth;
  canvas.width = w * dpr;
  canvas.height = 180 * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = "180px";
  ctx = canvas.getContext("2d", {willReadFrequently: true});
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = "#1d1d1f";
  ctx.lineWidth = 2.5;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  clearCanvas();

  const getPos = (e)=>{
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width/(window.devicePixelRatio||1)/r.width;
    const scaleY = canvas.height/(window.devicePixelRatio||1)/r.height;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    return {x:(cx-r.left)*scaleX, y:(cy-r.top)*scaleY};
  };

  const start = (e)=>{ e.preventDefault(); drawing=true; const p=getPos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); };
  const move = (e)=>{ if(!drawing)return; e.preventDefault(); const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); };
  const end = ()=>{ drawing=false; };

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start, {passive:false});
  canvas.addEventListener("touchmove", move, {passive:false});
  canvas.addEventListener("touchend", end);
}

function clearCanvas(){
  if(!ctx) return;
  const dpr = window.devicePixelRatio||1;
  ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,canvas.width/dpr,canvas.height/dpr);
}

function isEmpty(){
  if(!ctx) return true;
  const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
  for(let i=0;i<data.length;i+=4){ if(data[i+3]>10 && !(data[i]===255&&data[i+1]===255&&data[i+2]===255)) return false; }
  return true;
}

async function submitSignature(){
  if(isEmpty()){
    toast("Najprv sa podpíš", true);
    return;
  }
  ov(true, "Ukladám podpis a vytvárám dokument...");
  try{
    const signature = canvas.toDataURL("image/png");
    const r = await fetch(`/api/doc/${token}/sign`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({signature})
    });
    ov(false);
    if(r.ok){
      showStep("step-done");
    } else {
      toast("Chyba ukladania", true);
    }
  }catch(e){
    ov(false);
    toast("Chyba spojenia", true);
  }
}

function downloadSigned(){
  window.open(`/api/doc/${token}/download`, "_blank");
  setTimeout(()=>{ location.href = "/"; }, 800);
}

init();
</script>
</body>
</html>
